<!doctype html>
<html lang="en">
	<head>
		<meta charset="utf-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1" />
		<link rel="preconnect" href="https://fonts.googleapis.com" />
		<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
		<link href="https://fonts.googleapis.com/css2?family=Instrument+Sans:wght@400;500;600&family=Instrument+Serif:ital@1&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />
		<link rel="icon" type="image/svg+xml" href="/favicon.svg" />
		<title>Raydr</title>

		<!-- SEO -->
		<meta name="description" content="Raydr is a developer platform for shipping and demoing projects on a monthly cadence. AI-powered progress analysis, milestone tracking, and DPG compliance evaluation." />

		<!-- Open Graph -->
		<meta property="og:type" content="website" />
		<meta property="og:site_name" content="Raydr" />
		<meta property="og:title" content="Raydr — Build. Ship. Demo. Repeat." />
		<meta property="og:description" content="A developer platform for shipping and demoing projects on a monthly cadence. AI-powered progress analysis, milestone tracking, and DPG compliance evaluation." />
		<meta property="og:image" content="/og-image.png" />
		<meta property="og:image:width" content="1200" />
		<meta property="og:image:height" content="630" />
		<meta property="og:image:alt" content="Raydr — A developer platform" />

		<!-- Twitter Card -->
		<meta name="twitter:card" content="summary_large_image" />
		<meta name="twitter:title" content="Raydr — Build. Ship. Demo. Repeat." />
		<meta name="twitter:description" content="A developer platform for shipping and demoing projects on a monthly cadence. AI-powered progress analysis, milestone tracking, and DPG compliance evaluation." />
		<meta name="twitter:image" content="/og-image.png" />

		%sveltekit.head%
	</head>
	<body data-sveltekit-preload-data="hover">
		<div style="display: contents">%sveltekit.body%</div>
	</body>
</html>
